<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Task API - Swagger UI</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swagger-ui-dist@5.32.8/swagger-ui.css">
  <style>
    html { box-sizing: border-box; overflow-y: scroll; }
    *, *::before, *::after { box-sizing: inherit; }
    body { margin: 0; background: #fafafa; }
    .offline-note { max-width: 960px; margin: 24px auto; padding: 16px 20px; border: 1px solid #f0c36d; background: #fff8e1; font: 15px/1.5 system-ui, sans-serif; }
    .offline-note code { background: #f1f1f1; padding: 2px 5px; }
  </style>
</head>
<body>
  <div id="swagger-ui"></div>
  <div id="offline-note" class="offline-note">
    Loading Swagger UI. The OpenAPI document is always available at <code>/openapi.json</code>.
    The visual UI uses pinned CDN assets and therefore needs an internet connection in the browser.
  </div>

  <script src="https://cdn.jsdelivr.net/npm/swagger-ui-dist@5.32.8/swagger-ui-bundle.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/swagger-ui-dist@5.32.8/swagger-ui-standalone-preset.js"></script>
  <script>
    window.addEventListener("load", function () {
      if (typeof SwaggerUIBundle === "undefined") return;
      document.getElementById("offline-note").remove();
      window.ui = SwaggerUIBundle({
        url: "/openapi.json",
        dom_id: "#swagger-ui",
        deepLinking: true,
        displayRequestDuration: true,
        tryItOutEnabled: true,
        presets: [SwaggerUIBundle.presets.apis, SwaggerUIStandalonePreset],
        plugins: [SwaggerUIBundle.plugins.DownloadUrl],
        layout: "StandaloneLayout"
      });
    });
  </script>
</body>
</html>
